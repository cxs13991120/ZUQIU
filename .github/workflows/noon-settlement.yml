name: Afternoon Sporttery Settlement

on:
  workflow_dispatch:
  schedule:
    # 13:45 Beijing time, before the 14:00 email window.
    - cron: "45 5 * * *"
    # Retry at 14:05 in case results or the first scheduled run are delayed.
    - cron: "5 6 * * *"

permissions:
  contents: write
  pages: write
  id-token: write

concurrency:
  group: sporttery-repository
  cancel-in-progress: false
  queue: max

jobs:
  settlement:
    runs-on: ubuntu-latest
    env:
      TZ: Asia/Shanghai
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install learning dependencies and image fonts
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y -qq fonts-noto-cjk
          python -m pip install --quiet -r requirements.txt
          python -m pip install --quiet pillow

      - name: Update results, settle ledgers, and train the draw model
        run: |
          TODAY="$(date +%F)"
          SETTLEMENT_DATE="$(date -d 'yesterday' +%F)"
          python update_sporttery_results.py --date "$SETTLEMENT_DATE"
          python build_historical_features.py
          python generate_betting_plan.py --settle-only
          python draw_alert_ledger.py --settle
          python draw_model_learning.py --train --date "$TODAY"
          python build_site.py
          python build_daily_image.py

      - name: Commit settlement files
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: "Update Sporttery settlement"
          file_pattern: "data/bet_results.csv data/team_history_features.csv data/market_heat_*.json data/draw_feature_snapshots/*.json data/models/*.joblib output/betting_ledger.csv output/observation_ledger.csv output/model_metrics.json output/draw_alert*.csv output/draw_alert*.json output/draw_model_registry.json web/index.html web/daily-report.png"

      - name: Configure Pages
        uses: actions/configure-pages@v5

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: web

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
